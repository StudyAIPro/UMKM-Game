<!DOCTYPE html>
<html>
<head>
<title>Top-Up Game</title>

<style>
body{
  font-family:Arial;
  margin:0;
  text-align:center;
  color:white;

  /* background simple, berhubungan game */
  background:#1f1f2e;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.05) 2%, transparent 2%),
    radial-gradient(circle, rgba(255,255,255,0.05) 2%, transparent 2%);
  background-size:50px 50px;
  background-position:0 0, 25px 25px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:40px;
}

.card{
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#9b59b6;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:12px;
}

button:hover{
  background:#8e44ad;
}

select,input{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.hidden{
  display:none;
}

.receipt{
  text-align:left;
  font-family:monospace;
  line-height:1.6;
}

@media print{
  body *{visibility:hidden;}
  #receipt, #receipt *{visibility:visible;}
  #receipt{position:absolute;left:0;top:0;width:100%;}
}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Top-Up Game</h1>
<p>Pilih game dan nominal top-up</p>

<div class="card" id="menu">

<h3>Pilih Game</h3>
<select id="game">
<option value="5000">Mobile Legends - Rp5.000</option>
<option value="10000">Free Fire - Rp10.000</option>
<option value="20000">PUBG Mobile - Rp20.000</option>
<option value="30000">Valorant - Rp30.000</option>
</select>

<h3>Pilih Jumlah Top-Up</h3>
<input type="number" id="jumlah" value="1" min="1">

<h3>Pilih Metode Pembayaran</h3>
<select id="metode">
<option>DANA</option>
<option>OVO</option>
<option>Cash</option>
</select>

<br>
<button onclick="topup()">Top-Up Sekarang</button>

</div>

<div class="card hidden" id="receipt">
<h3>STRUK TOP-UP</h3>
<div class="receipt" id="isiStruk"></div>
<br>
<button onclick="printStruk()">Cetak Struk</button>
<br>
<button onclick="location.reload()">Top-Up Lagi</button>
</div>

</div>

<script>
function topup(){
  var gameSelect=document.getElementById("game")
  var namaGame=gameSelect.options[gameSelect.selectedIndex].text
  var harga=parseInt(gameSelect.value)
  var jumlah=document.getElementById("jumlah").value
  var metode=document.getElementById("metode").value

  var total=harga*jumlah
  var kode="TOPUP"+Math.floor(Math.random()*100000)
  var waktu=new Date().toLocaleString()

  var struk=`
==========================
TOP-UP GAME
==========================

Game : ${namaGame}
Jumlah : ${jumlah}
Metode : ${metode}

--------------------------
TOTAL : Rp ${total}
--------------------------

Kode Transaksi : ${kode}
Waktu : ${waktu}
Status : BERHASIL
==========================
Terima Kasih 🎮
  `

  document.getElementById("menu").style.display="none"
  document.getElementById("receipt").classList.remove("hidden")
  document.getElementById("isiStruk").innerText=struk
}

function printStruk(){
  window.print()
}
</script>

</body>
</html>
